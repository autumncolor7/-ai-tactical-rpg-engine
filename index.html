<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鋼鐵小隊64</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #05070e;
      color: #f2f6ff;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script>
    const W = 1280;
    const H = 720;

    const C = {
      bg: 0x060814,
      deep: 0x0b1230,
      panel: 0x121b3f,
      panel2: 0x1b2856,
      line: 0x7896d9,
      line2: 0xf4d06f,
      white: '#f2f6ff',
      muted: '#a7b6e8',
      green: 0x62e19f,
      greenText: '#7df2b7',
      red: 0xff5a5a,
      blue: 0x4f8dff,
      amber: 0xf6c85b,
      darkText: '#071026'
    };

    const unitCatalog = {
      gundam: {
        id: 'gundam',
        name: '高達',
        pilot: '阿寶',
        type: 'ace',
        role: '皇牌機',
        cost: 0,
        hp: 42,
        en: 34,
        atk: 15,
        def: 10,
        move: 5,
        range: 4,
        weapon: '光束步槍',
        melee: '光束軍刀',
        colors: [0xe9edf4, 0x2467e6, 0xd93434, 0xf2c24f],
        note: '不能購買。小隊核心，能力均衡。'
      },
      mk2: {
        id: 'mk2',
        name: '高達Mk-II',
        pilot: '卡美尤',
        type: 'ace',
        role: '皇牌機',
        cost: 0,
        hp: 38,
        en: 36,
        atk: 16,
        def: 8,
        move: 6,
        range: 4,
        weapon: '光束步槍',
        melee: '光束軍刀',
        colors: [0xdfe6ef, 0x1c2d4f, 0xd64b4b, 0xffdf66],
        note: '不能購買。速度較高的皇牌機。'
      },
      gm: {
        id: 'gm',
        name: '吉姆',
        pilot: '聯邦兵',
        type: 'mass',
        role: '量產機',
        cost: 120,
        hp: 22,
        en: 18,
        atk: 7,
        def: 5,
        move: 4,
        range: 3,
        weapon: '光束噴槍',
        melee: '軍刀',
        colors: [0xd7e8df, 0xa84646, 0x677d86, 0xf0f0f0],
        note: '便宜可靠，適合填補小隊。'
      },
      leo: {
        id: 'leo',
        name: '里歐',
        pilot: 'OZ兵',
        type: 'mass',
        role: '量產機',
        cost: 100,
        hp: 24,
        en: 16,
        atk: 6,
        def: 6,
        move: 4,
        range: 2,
        weapon: '105mm步槍',
        melee: '光束劍',
        colors: [0x6e8753, 0x36472f, 0xcfd6bd, 0xf2c24f],
        note: '防禦略好，火力普通。'
      },
      zaku: {
        id: 'zaku',
        name: '渣古II',
        pilot: '吉翁兵',
        type: 'mass',
        role: '量產機',
        cost: 110,
        hp: 25,
        en: 15,
        atk: 7,
        def: 5,
        move: 4,
        range: 3,
        weapon: '機槍',
        melee: '熱能斧',
        colors: [0x6fa26b, 0x2e4a35, 0x1d221f, 0xd75959],
        note: '量產火力穩定。'
      }
    };

    const upgrades = {
      weapon: { name: '武器改造', level: 0, max: 5, cost: 160, desc: '全小隊攻擊 +1' },
      armor: { name: '裝甲改造', level: 0, max: 5, cost: 130, desc: '全小隊防禦 +1' },
      booster: { name: '推進器改造', level: 0, max: 3, cost: 180, desc: '小隊移動 +1' }
    };

    const state = {
      credits: 620,
      level: 1,
      selectedId: 'gundam',
      activeSlot: 0,
      roster: [
        { uid: 'gundam-1', id: 'gundam' },
        { uid: 'gm-1', id: 'gm' },
        { uid: 'leo-1', id: 'leo' }
      ],
      squad: ['gundam-1', 'gm-1', 'leo-1'],
      upgrades: structuredClone(upgrades)
    };

    function unit(uid) {
      const item = state.roster.find((u) => u.uid === uid);
      return item ? unitCatalog[item.id] : null;
    }

    function selectedUnit() {
      return unitCatalog[state.selectedId];
    }

    function squadMembers() {
      return state.squad.map(unit).filter(Boolean);
    }

    function squadStats() {
      const members = squadMembers();
      const core = members[0] || unitCatalog.gundam;
      const hp = members.reduce((sum, u, i) => sum + Math.round(u.hp * (i === 0 ? 1 : 0.55)), 0);
      const en = members.reduce((sum, u, i) => sum + Math.round(u.en * (i === 0 ? 1 : 0.35)), 0);
      const atk = Math.max(...members.map((u) => u.atk), core.atk) + Math.max(0, members.length - 1) + state.upgrades.weapon.level;
      const def = Math.round(members.reduce((sum, u, i) => sum + u.def * (i === 0 ? 1 : 0.45), 0)) + state.upgrades.armor.level;
      const move = Math.max(3, Math.min(...members.map((u) => u.move), core.move) + state.upgrades.booster.level);
      const range = Math.max(...members.map((u) => u.range), core.range);
      return { hp, maxHp: hp, en, maxEn: en, atk, def, move, range, coreName: core.name, members };
    }

    function makeUid(id) {
      const n = state.roster.filter((u) => u.id === id).length + 1;
      return `${id}-${Date.now()}-${n}`;
    }

    function drawPanel(scene, x, y, w, h, title) {
      const g = scene.add.graphics();
      g.fillStyle(C.panel, 0.98).fillRect(x, y, w, h);
      g.lineStyle(3, C.line, 1).strokeRect(x, y, w, h);
      g.lineStyle(1, C.line2, 0.9).strokeRect(x + 5, y + 5, w - 10, h - 10);
      scene.add.text(x + 18, y + 14, title, {
        fontSize: '20px',
        fontStyle: 'bold',
        color: C.white
      });
    }

    function drawScanlines(scene) {
      const g = scene.add.graphics();
      g.lineStyle(1, 0xffffff, 0.035);
      for (let y = 0; y < H; y += 4) {
        g.lineBetween(0, y, W, y);
      }
    }

    function drawMiniMech(scene, x, y, scale, data, flip = false, group = null) {
      const dir = flip ? -1 : 1;
      const colors = data.colors;
      const add = (obj) => {
        if (group) group.push(obj);
        return obj;
      };
      const r = (dx, dy, w, h, color) => add(scene.add.rectangle(x + dx * scale * dir, y + dy * scale, w * scale, h * scale, color));
      const c = (dx, dy, rad, color) => add(scene.add.circle(x + dx * scale * dir, y + dy * scale, rad * scale, color));
      r(0, -18, 20, 26, colors[0]);
      r(0, -39, 14, 12, colors[0]);
      r(-13, -18, 7, 22, colors[1]);
      r(13, -18, 7, 22, colors[1]);
      r(-7, 2, 8, 24, colors[2]);
      r(8, 2, 8, 24, colors[2]);
      r(0, -23, 12, 8, colors[3]);
      c(0, -40, 2.2, 0x111827);
      r(26, -21, 24, 5, colors[3]);
    }

    class Button {
      constructor(scene, x, y, w, h, label, onClick, opts = {}) {
        this.scene = scene;
        this.bg = scene.add.rectangle(x, y, w, h, opts.fill || C.blue)
          .setStrokeStyle(2, opts.stroke || C.line2)
          .setInteractive();
        this.text = scene.add.text(x, y, label, {
          fontSize: opts.fontSize || '18px',
          fontStyle: 'bold',
          color: opts.color || C.white,
          align: 'center'
        }).setOrigin(0.5);
        this.bg.on('pointerover', () => this.bg.setFillStyle(opts.hover || 0x6fa2ff));
        this.bg.on('pointerout', () => this.bg.setFillStyle(opts.fill || C.blue));
        this.bg.on('pointerdown', onClick);
      }
    }

    class HangarScene extends Phaser.Scene {
      constructor() {
        super('HangarScene');
      }

      create() {
        this.cameras.main.setBackgroundColor('#05070e');
        this.drawBack();
        this.drawHeader();
        this.drawSquad();
        this.drawRoster();
        this.drawShop();
        this.drawDetails();
        this.drawBottom();
        drawScanlines(this);
      }

      drawBack() {
        const g = this.add.graphics();
        g.fillStyle(C.bg).fillRect(0, 0, W, H);
        g.fillStyle(0x0b1434).fillRect(0, 88, W, 512);
        g.lineStyle(1, 0x304c9a, 0.28);
        for (let x = -120; x < W; x += 56) g.lineBetween(x, 600, x + 260, 88);
        for (let y = 110; y < 600; y += 46) g.lineBetween(0, y, W, y);
        g.fillStyle(0x05070e).fillRect(0, 600, W, 120);
      }

      drawHeader() {
        this.add.text(34, 22, '鋼鐵小隊64', { fontSize: '34px', fontStyle: 'bold', color: C.white });
        this.add.text(38, 62, `第 ${state.level} 話  出擊準備`, { fontSize: '17px', color: C.muted });
        this.add.text(1000, 31, `資金 ${state.credits}`, { fontSize: '25px', fontStyle: 'bold', color: '#ffe08a' });
      }

      drawSquad() {
        drawPanel(this, 28, 112, 360, 438, '小隊編成');
        const stats = squadStats();
        const slotNames = ['隊長', '僚機A', '僚機B'];
        state.squad.forEach((uid, i) => {
          const u = unit(uid);
          const y = 166 + i * 104;
          const selected = state.activeSlot === i;
          const rect = this.add.rectangle(54, y, 304, 82, selected ? 0x263d77 : C.panel2)
            .setOrigin(0, 0.5)
            .setStrokeStyle(2, selected ? C.line2 : C.line)
            .setInteractive();
          rect.on('pointerdown', () => {
            state.activeSlot = i;
            this.scene.restart();
          });
          this.add.text(74, y - 32, slotNames[i], { fontSize: '16px', color: '#ffe08a', fontStyle: 'bold' });
          if (u) {
            drawMiniMech(this, 100, y + 28, 0.72, u);
            this.add.text(144, y - 24, u.name, { fontSize: '20px', color: C.white, fontStyle: 'bold' });
            this.add.text(144, y + 2, `${u.pilot} / ${u.role}`, { fontSize: '14px', color: C.muted });
            this.add.text(144, y + 23, `${u.weapon}  射程${u.range}`, { fontSize: '14px', color: '#b9c8ff' });
          } else {
            this.add.text(142, y - 12, '未編入', { fontSize: '20px', color: C.muted });
          }
        });

        const rows = [
          ['HP', `${stats.hp}`],
          ['EN', `${stats.en}`],
          ['攻擊', `${stats.atk}`],
          ['防禦', `${stats.def}`],
          ['移動/射程', `${stats.move} / ${stats.range}`]
        ];
        rows.forEach((r, i) => {
          this.add.text(66, 472 + i * 22, r[0], { fontSize: '15px', color: C.muted });
          this.add.text(330, 472 + i * 22, r[1], { fontSize: '16px', color: C.white, fontStyle: 'bold' }).setOrigin(1, 0);
        });
      }

      drawRoster() {
        drawPanel(this, 414, 112, 360, 438, '所持機體');
        state.roster.forEach((item, i) => {
          const data = unitCatalog[item.id];
          const y = 168 + i * 58;
          const selected = state.selectedId === item.id;
          const rect = this.add.rectangle(438, y, 312, 44, selected ? 0x2b407c : 0x182753)
            .setOrigin(0, 0.5)
            .setStrokeStyle(2, selected ? C.line2 : 0x4f69ad)
            .setInteractive();
          rect.on('pointerdown', () => {
            state.selectedId = item.id;
            this.scene.restart();
          });
          this.add.text(454, y - 16, data.name, { fontSize: '18px', fontStyle: 'bold', color: C.white });
          this.add.text(454, y + 7, `${data.pilot}  ${data.role}`, { fontSize: '13px', color: C.muted });
          this.add.text(732, y - 7, `HP ${data.hp}`, { fontSize: '14px', color: '#dfe7ff' }).setOrigin(1, 0);
        });
        new Button(this, 594, 512, 260, 42, '編入選中機體到目前小隊格', () => {
          const entry = state.roster.find((u) => u.id === state.selectedId);
          if (!entry) return;
          if (state.squad.includes(entry.uid)) this.toast('此機體已在小隊中');
          else {
            state.squad[state.activeSlot] = entry.uid;
            this.scene.restart();
          }
        }, { fill: 0x3158b7, hover: 0x4774dc, fontSize: '16px' });
      }

      drawShop() {
        drawPanel(this, 800, 112, 208, 438, '量產機購買');
        const items = ['gm', 'leo', 'zaku'];
        items.forEach((id, i) => {
          const u = unitCatalog[id];
          const y = 178 + i * 106;
          this.add.rectangle(824, y, 160, 82, 0x182753).setOrigin(0, 0.5).setStrokeStyle(2, 0x4f69ad);
          drawMiniMech(this, 856, y + 24, 0.55, u);
          this.add.text(900, y - 28, u.name, { fontSize: '17px', color: C.white, fontStyle: 'bold' });
          this.add.text(900, y - 6, `資金 ${u.cost}`, { fontSize: '14px', color: '#ffe08a' });
          this.add.text(900, y + 15, `攻${u.atk} 防${u.def}`, { fontSize: '13px', color: C.muted });
          new Button(this, 936, y + 42, 88, 26, '購入', () => this.buyUnit(id), {
            fill: 0x304c9a,
            hover: 0x466bd0,
            fontSize: '13px'
          });
        });
      }

      buyUnit(id) {
        const u = unitCatalog[id];
        if (state.credits < u.cost) {
          this.toast('資金不足');
          return;
        }
        state.credits -= u.cost;
        const uid = makeUid(id);
        state.roster.push({ uid, id });
        state.selectedId = id;
        this.toast(`${u.name} 配備完了`);
        this.time.delayedCall(280, () => this.scene.restart());
      }

      drawDetails() {
        drawPanel(this, 1032, 112, 218, 438, '機體資料 / 改造');
        const u = selectedUnit();
        drawMiniMech(this, 1138, 236, 1.45, u);
        this.add.text(1060, 152, u.name, { fontSize: '26px', color: C.white, fontStyle: 'bold' });
        this.add.text(1062, 187, `${u.pilot}  ${u.role}`, { fontSize: '15px', color: '#ffe08a' });
        const rows = [
          ['HP', u.hp],
          ['EN', u.en],
          ['攻擊', u.atk],
          ['防禦', u.def],
          ['移動', u.move],
          ['射程', u.range]
        ];
        rows.forEach((r, i) => {
          this.add.text(1062, 314 + i * 22, r[0], { fontSize: '14px', color: C.muted });
          this.add.text(1220, 314 + i * 22, String(r[1]), { fontSize: '15px', color: C.white, fontStyle: 'bold' }).setOrigin(1, 0);
        });
        this.add.text(1060, 454, u.note, { fontSize: '13px', color: '#c7d1ff', wordWrap: { width: 160 } });
        const ups = Object.entries(state.upgrades);
        ups.forEach(([key, up], i) => {
          const y = 512 + i * 38;
          this.add.text(1060, y, `${up.name} Lv${up.level}`, { fontSize: '13px', color: C.white });
          new Button(this, 1192, y + 8, 64, 24, `${up.cost}`, () => this.upgrade(key), {
            fill: 0x8a6a1e,
            hover: 0xb48925,
            fontSize: '12px'
          });
        });
      }

      upgrade(key) {
        const up = state.upgrades[key];
        if (up.level >= up.max) return this.toast('已達上限');
        const cost = up.cost + up.level * 80;
        if (state.credits < cost) return this.toast('資金不足');
        state.credits -= cost;
        up.level += 1;
        this.scene.restart();
      }

      toast(text) {
        const t = this.add.text(W / 2, 92, text, { fontSize: '22px', color: '#ffe08a', fontStyle: 'bold' }).setOrigin(0.5);
        this.tweens.add({ targets: t, y: 70, alpha: 0, duration: 900, onComplete: () => t.destroy() });
      }

      drawBottom() {
        const g = this.add.graphics();
        g.fillStyle(0x05070e).fillRect(0, 600, W, 120);
        g.lineStyle(3, C.line, 1).lineBetween(0, 600, W, 600);
        this.add.text(36, 624, '作戰方針', { fontSize: '18px', color: '#ffe08a', fontStyle: 'bold' });
        this.add.text(36, 654, '小隊戰鬥：整備時編成三機，戰鬥時視為同一單位共用一格移動。皇牌機不能購買，量產機可補充。', {
          fontSize: '19px',
          color: C.white
        });
        new Button(this, 1012, 660, 250, 56, '出擊下一話', () => this.scene.start('BattleScene'), {
          fill: 0x1f7f66,
          hover: 0x29a781,
          fontSize: '24px'
        });
      }
    }

    class BattleScene extends Phaser.Scene {
      constructor() {
        super('BattleScene');
      }

      create() {
        this.cols = 9;
        this.rows = 7;
        this.tile = 64;
        this.originX = 292;
        this.originY = 108;
        const stats = squadStats();
        this.phase = 'player';
        this.selected = false;
        this.busy = false;
        this.player = { team: 'player', x: 1, y: 4, hp: stats.hp, maxHp: stats.hp, en: stats.en, maxEn: stats.en, atk: stats.atk, def: stats.def, move: stats.move, range: stats.range, data: stats.members[0] };
        this.enemies = [
          this.enemy('leo', 6, 2, 0),
          this.enemy('zaku', 7, 4, 1),
          this.enemy('gm', 5, 5, 2)
        ];
        this.staticObjects = [];
        this.dynamicObjects = [];
        this.cameras.main.setBackgroundColor('#05070e');
        this.drawStatic();
        this.drawAll();
        drawScanlines(this);
      }

      enemy(id, x, y, add) {
        const d = unitCatalog[id];
        return {
          team: 'enemy',
          x,
          y,
          hp: d.hp + state.level * 4 + add * 3,
          maxHp: d.hp + state.level * 4 + add * 3,
          atk: d.atk + state.level,
          def: d.def,
          move: d.move,
          range: d.range,
          data: d
        };
      }

      drawStatic() {
        const g = this.add.graphics();
        g.fillStyle(C.bg).fillRect(0, 0, W, H);
        g.fillStyle(0x0a1435).fillRect(0, 0, 248, H);
        g.fillStyle(0x05070e).fillRect(0, 600, W, 120);
        g.lineStyle(3, C.line, 1).lineBetween(248, 0, 248, 600);
        g.lineStyle(3, C.line, 1).lineBetween(0, 600, W, 600);
        this.add.text(32, 30, `第 ${state.level} 話`, { fontSize: '32px', color: C.white, fontStyle: 'bold' });
        this.add.text(34, 72, '小隊出擊', { fontSize: '18px', color: '#ffe08a' });
        new Button(this, 74, 660, 136, 42, '整備室', () => this.scene.start('HangarScene'), {
          fill: 0x24386f,
          hover: 0x3858a8,
          fontSize: '17px'
        });
      }

      clearDynamic() {
        this.dynamicObjects.forEach((o) => o.destroy());
        this.dynamicObjects = [];
      }

      addDyn(obj) {
        this.dynamicObjects.push(obj);
        return obj;
      }

      drawAll() {
        this.clearDynamic();
        this.drawGrid();
        this.drawUnits();
        this.drawHud();
      }

      drawGrid() {
        const moves = this.selected ? this.reachable(this.player) : [];
        const attacks = this.selected ? this.attackable(this.player) : [];
        for (let y = 0; y < this.rows; y++) {
          for (let x = 0; x < this.cols; x++) {
            const wx = this.originX + x * this.tile;
            const wy = this.originY + y * this.tile;
            const move = moves.some((p) => p.x === x && p.y === y);
            const attack = attacks.some((p) => p.x === x && p.y === y);
            const base = (x + y) % 2 ? 0x16284f : 0x102247;
            const color = attack ? 0x63252f : move ? 0x1d4f4a : base;
            const rect = this.addDyn(this.add.rectangle(wx, wy, this.tile - 3, this.tile - 3, color).setOrigin(0, 0)
              .setStrokeStyle(1, attack ? C.red : move ? C.green : 0x365899)
              .setInteractive());
            rect.on('pointerdown', () => this.handleTile(x, y));
          }
        }
      }

      drawUnits() {
        this.drawMapUnit(this.player);
        this.enemies.forEach((e) => this.drawMapUnit(e));
      }

      drawMapUnit(u) {
        const cx = this.originX + u.x * this.tile + this.tile / 2;
        const cy = this.originY + u.y * this.tile + this.tile / 2 + 14;
        const parts = [];
        drawMiniMech(this, cx, cy, 0.78, u.data, u.team === 'enemy', parts);
        parts.forEach((p) => {
          this.addDyn(p);
          if (u.team === 'player') p.setInteractive?.();
        });
        const selectPad = this.addDyn(this.add.rectangle(cx, cy - 16, 54, 54, 0xffffff, 0.001).setInteractive());
        if (u.team === 'player') {
          selectPad.on('pointerdown', () => {
            if (this.phase === 'player' && !this.busy) {
              this.selected = true;
              this.drawAll();
            }
          });
        }
        const bar = Math.max(0, 46 * (u.hp / u.maxHp));
        this.addDyn(this.add.rectangle(cx - 23, cy + 25, 46, 6, 0x111827).setOrigin(0, 0.5));
        this.addDyn(this.add.rectangle(cx - 23, cy + 25, bar, 6, u.team === 'player' ? C.green : C.red).setOrigin(0, 0.5));
      }

      drawHud() {
        const lines = [
          ['HP', `${this.player.hp}/${this.player.maxHp}`],
          ['EN', `${this.player.en}/${this.player.maxEn}`],
          ['攻擊', this.player.atk],
          ['防禦', this.player.def],
          ['移動', this.player.move],
          ['射程', this.player.range],
          ['敵機', this.enemies.length]
        ];
        lines.forEach((r, i) => {
          this.addDyn(this.add.text(32, 132 + i * 31, r[0], { fontSize: '17px', color: C.muted }));
          this.addDyn(this.add.text(202, 132 + i * 31, String(r[1]), { fontSize: '18px', color: C.white, fontStyle: 'bold' }).setOrigin(1, 0));
        });
        const tip = this.phase === 'player'
          ? '點選小隊後，選綠格移動，紅格攻擊。攻擊會切入簡短戰鬥畫面。'
          : '敵方行動中';
        this.addDyn(this.add.text(292, 628, tip, { fontSize: '20px', color: C.white }));
        if (this.phase === 'player') {
          const btn = new Button(this, 1104, 660, 176, 46, '回合終了', () => this.enemyTurn(), {
            fill: 0x24386f,
            hover: 0x3858a8,
            fontSize: '19px'
          });
          this.dynamicObjects.push(btn.bg, btn.text);
        }
      }

      distance(a, b) {
        return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
      }

      occupied(x, y) {
        if (this.player.x === x && this.player.y === y) return true;
        return this.enemies.some((e) => e.x === x && e.y === y);
      }

      reachable(u) {
        const cells = [];
        for (let y = 0; y < this.rows; y++) {
          for (let x = 0; x < this.cols; x++) {
            const d = Math.abs(u.x - x) + Math.abs(u.y - y);
            if (d > 0 && d <= u.move && !this.occupied(x, y)) cells.push({ x, y });
          }
        }
        return cells;
      }

      attackable(u) {
        return this.enemies.filter((e) => this.distance(u, e) <= u.range).map((e) => ({ x: e.x, y: e.y }));
      }

      handleTile(x, y) {
        if (this.busy || this.phase !== 'player' || !this.selected) return;
        const target = this.enemies.find((e) => e.x === x && e.y === y);
        if (target && this.distance(this.player, target) <= this.player.range) {
          this.selected = false;
          this.resolveAttack(this.player, target, () => this.afterPlayerAction());
          return;
        }
        if (this.reachable(this.player).some((p) => p.x === x && p.y === y)) {
          this.player.x = x;
          this.player.y = y;
          this.selected = false;
          this.drawAll();
        }
      }

      damage(attacker, defender) {
        return Math.max(4, attacker.atk + Phaser.Math.Between(-2, 3) - Math.floor(defender.def / 2));
      }

      resolveAttack(attacker, defender, done) {
        this.busy = true;
        const dmg = this.damage(attacker, defender);
        this.showBattleCutin(attacker, defender, dmg, () => {
          defender.hp -= dmg;
          if (defender.team === 'enemy' && defender.hp <= 0) this.enemies = this.enemies.filter((e) => e !== defender);
          if (defender.team === 'player' && defender.hp <= 0) this.lose();
          else {
            this.busy = false;
            done?.();
          }
        });
      }

      showBattleCutin(attacker, defender, dmg, done) {
        const objs = [];
        const add = (o) => {
          objs.push(o);
          return o;
        };
        add(this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.82));
        add(this.add.rectangle(W / 2, 170, W, 180, 0x0a1435).setStrokeStyle(3, C.line));
        add(this.add.rectangle(W / 2, 430, W, 180, 0x190d13).setStrokeStyle(3, C.red));
        add(this.add.text(42, 94, `${attacker.data.name}  ${attacker.data.weapon}`, { fontSize: '26px', color: C.white, fontStyle: 'bold' }));
        add(this.add.text(42, 466, `${defender.data.name}`, { fontSize: '24px', color: '#ffd0d0', fontStyle: 'bold' }));
        const pParts = [];
        const eParts = [];
        drawMiniMech(this, 260, 236, 2.2, attacker.data, false, pParts);
        drawMiniMech(this, 980, 496, 2.2, defender.data, true, eParts);
        pParts.forEach(add);
        eParts.forEach(add);
        const beam = add(this.add.rectangle(530, 238, 0, 8, 0x8be9ff));
        const slash = attacker.data.melee.includes('斧') || attacker.data.melee.includes('軍刀');
        this.tweens.add({
          targets: pParts,
          x: slash ? 70 : 0,
          duration: 180,
          yoyo: true
        });
        this.tweens.add({
          targets: beam,
          width: 420,
          duration: 170,
          delay: 120,
          onComplete: () => {
            eParts.forEach((o) => o.setTint?.(0xffffff));
            this.cameras.main.shake(160, 0.008);
            add(this.add.text(900, 386, `${dmg} DAMAGE`, { fontSize: '34px', color: '#ffe08a', fontStyle: 'bold' }));
            this.time.delayedCall(260, () => eParts.forEach((o) => o.clearTint?.()));
          }
        });
        this.time.delayedCall(850, () => {
          objs.forEach((o) => o.destroy());
          done();
          this.drawAll();
        });
      }

      afterPlayerAction() {
        if (this.enemies.length === 0) return this.win();
        this.drawAll();
      }

      enemyTurn() {
        if (this.busy || this.phase !== 'player') return;
        this.phase = 'enemy';
        this.selected = false;
        this.drawAll();
        let i = 0;
        const step = () => {
          if (i >= this.enemies.length) {
            this.phase = 'player';
            this.drawAll();
            return;
          }
          const e = this.enemies[i++];
          if (this.distance(e, this.player) <= e.range) {
            this.resolveAttack(e, this.player, step);
          } else {
            const dx = Math.sign(this.player.x - e.x);
            const dy = Math.sign(this.player.y - e.y);
            const tries = [{ x: e.x + dx, y: e.y }, { x: e.x, y: e.y + dy }];
            const next = tries.find((p) => p.x >= 0 && p.y >= 0 && p.x < this.cols && p.y < this.rows && !this.occupied(p.x, p.y));
            if (next) {
              e.x = next.x;
              e.y = next.y;
            }
            this.drawAll();
            this.time.delayedCall(260, step);
          }
        };
        this.time.delayedCall(350, step);
      }

      win() {
        state.level += 1;
        state.credits += 300 + state.level * 60;
        this.result('作戰成功', '獲得資金，返回整備室。');
      }

      lose() {
        state.credits += 80;
        this.result('撤退', '小隊大破，返回整備室重新編成。');
      }

      result(title, body) {
        this.busy = true;
        this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.75);
        this.add.rectangle(W / 2, H / 2, 460, 220, C.panel).setStrokeStyle(3, C.line2);
        this.add.text(W / 2, H / 2 - 62, title, { fontSize: '36px', color: '#ffe08a', fontStyle: 'bold' }).setOrigin(0.5);
        this.add.text(W / 2, H / 2 - 8, body, { fontSize: '19px', color: C.white }).setOrigin(0.5);
        new Button(this, W / 2, H / 2 + 66, 190, 46, '返回整備', () => this.scene.start('HangarScene'));
      }
    }

    const config = {
      type: Phaser.AUTO,
      parent: 'game',
      width: W,
      height: H,
      backgroundColor: '#05070e',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: [HangarScene, BattleScene]
    };

    window.addEventListener('load', () => {
      new Phaser.Game(config);
    });
  </script>
</body>
</html>
